name: Build & Deploy

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push ke GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha,prefix=sha-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            if [ "${{ github.ref_name }}" = "main" ]; then
              CONTAINER_NAME="point-coffee-production"
              IMAGE_TAG="main"
            else
              CONTAINER_NAME="point-coffee-staging"
              IMAGE_TAG="staging"
            fi

            echo ${{ secrets.CR_PAT }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            docker pull ${IMAGE_REPO}:${IMAGE_TAG}

            docker stop ${CONTAINER_NAME} 2>/dev/null || true
            docker rm ${CONTAINER_NAME} 2>/dev/null || true

            docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              --network proxy \
              ${IMAGE_REPO}:${IMAGE_TAG}

            docker image prune -f

            echo "✅ Deploy ${CONTAINER_NAME} berhasil!"